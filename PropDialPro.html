<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#6D28D9">
<title>PropDial</title>

<!-- XLSX: used for template download + Excel import only -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<!-- ExcelJS: used for color-coded Excel export (supports cell fill colors) -->
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>

<style>
/* ── iOS CALLING NOTES ────────────────────────────────────────────────────
   WHAT IS POSSIBLE on iPhone (web/PWA):
   - tel: links open the native Phone app with the number pre-filled
   - iOS shows "Call [number]?" confirmation — cannot be bypassed
   - One-tap dial via <a href="tel:..."> is supported and compliant

   WHAT IS NOT POSSIBLE without a VoIP provider (e.g. Twilio):
   - Detecting call state: ringing / answered / voicemail / ended
   - Auto-advancing after the call ends (no web callback when Phone app closes)
   - Detecting voicemail vs no-answer automatically
   - Suppressing the iOS confirmation dialog
   - Running JS while the call is active

   THE CORRECT COMPLIANT WORKFLOW (implemented here):
   1. Tap "Call Owner" → tel: link → iOS confirmation → Phone app opens
   2. Make the call, hang up, swipe back to PropDial
   3. Manually tap a call result button
   4. If Voicemail — a "Retry Once" banner appears, tap to call again
   5. Tap Save & Next — advances to next owner automatically

   FOR FULL AUTOMATION: Integrate Twilio Programmable Voice with WebRTC
   client in the browser + a backend server for token generation. This
   enables in-browser calling, voicemail detection, and auto-advance.
─────────────────────────────────────────────────────────────────────── */

/* ── Design Tokens ───────────────────────────────── */
:root {
  --p:        #6D28D9;
  --p-dark:   #4C1D95;
  --p-darker: #3B0764;
  --p-mid:    #8B5CF6;
  --p-light:  #EDE9FE;
  --p-xlight: #F5F3FF;
  --black:    #0A0A0A;
  --white:    #FFFFFF;
  --g50:      #F9FAFB;
  --g100:     #F3F4F6;
  --g200:     #E5E7EB;
  --g300:     #D1D5DB;
  --g400:     #9CA3AF;
  --g500:     #6B7280;
  --g700:     #374151;
  --g900:     #111827;
  --green:    #16A34A;
  --green-l:  #DCFCE7;
  --amber:    #D97706;
  --amber-l:  #FEF3C7;
  --red:      #DC2626;
  --red-l:    #FEE2E2;
  --blue:     #2563EB;
  --blue-l:   #DBEAFE;
  --r4: 4px; --r8: 8px; --r12: 12px; --r16: 16px; --r20: 20px; --r24: 24px;
  --sh1: 0 1px 3px rgba(0,0,0,.08);
  --sh2: 0 4px 16px rgba(0,0,0,.10);
  --sh3: 0 8px 32px rgba(0,0,0,.14);
  --shp: 0 4px 20px rgba(109,40,217,.35);
  --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
}

/* ── Reset ───────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;-webkit-tap-highlight-color:transparent}
body{
  font-family:var(--font);background:var(--white);color:var(--black);
  min-height:100%;max-width:480px;margin:0 auto;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;
}
button{cursor:pointer;border:none;background:none;font-family:var(--font);-webkit-tap-highlight-color:transparent}
input,textarea,select{font-family:var(--font);outline:none}
a{color:inherit;text-decoration:none}

/* ── Top Nav ─────────────────────────────────────── */
.nav{
  position:sticky;top:0;z-index:100;
  background:rgba(255,255,255,.97);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1.5px solid var(--g200);
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;padding-top:calc(14px + env(safe-area-inset-top,0px));
}
.nav-logo{font-size:22px;font-weight:900;letter-spacing:-0.8px;color:var(--black);display:flex;align-items:center;gap:2px}
.nav-logo span{color:var(--p)}
.nav-logo small{font-size:11px;font-weight:600;color:var(--g400);letter-spacing:.5px;margin-left:2px;margin-top:2px}
.nav-right{display:flex;gap:8px;align-items:center}
.nav-btn{padding:8px 14px;border-radius:var(--r12);font-size:14px;font-weight:700;transition:all .15s}
.nav-btn-ghost{color:var(--g700)}.nav-btn-ghost:active{background:var(--g100)}
.nav-btn-primary{background:var(--p);color:#fff;box-shadow:0 2px 8px rgba(109,40,217,.3)}
.nav-btn-primary:active{background:var(--p-dark);transform:scale(.97)}

/* ── Bottom Tab Bar ──────────────────────────────── */
.tab-bar{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;z-index:100;
  background:#fff;
  display:flex;flex-direction:column;
  /* Black home-indicator strip below the nav pill */
  padding-bottom:calc(env(safe-area-inset-bottom,0px) + 8px);
  border-top:1px solid var(--g200);
  box-shadow:0 -4px 24px rgba(0,0,0,.07);
}
.tab-bar-inner{
  display:flex;align-items:center;
  padding:6px 8px 0;
}
.tab-item{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:10px 4px 8px;color:var(--g400);font-size:11px;font-weight:700;
  letter-spacing:.2px;transition:color .15s;position:relative;border-radius:var(--r12);
}
.tab-item.active{color:var(--p)}
.tab-item.active svg{stroke:var(--p)}
.tab-item svg{width:26px;height:26px;stroke-width:1.8;transition:stroke .15s}
.tab-item:active{opacity:.6}
/* Active pill indicator above the icon */
.tab-item.active::before{
  content:'';position:absolute;top:0;left:25%;right:25%;height:3px;
  background:var(--p);border-radius:0 0 3px 3px;
}
.tab-badge{
  position:absolute;top:7px;right:calc(50% - 22px);
  background:var(--red);color:#fff;font-size:9px;font-weight:900;
  min-width:17px;height:17px;border-radius:999px;
  display:flex;align-items:center;justify-content:center;padding:0 4px;
  border:2px solid #fff;
}

/* ── Views ───────────────────────────────────────── */
.view{display:none;padding:20px 20px calc(108px + env(safe-area-inset-bottom,0px))}
.view.active{display:block}
.view-calling.active{padding:14px 16px calc(108px + env(safe-area-inset-bottom,0px))}

/* ── Typography ──────────────────────────────────── */
.page-title{font-size:28px;font-weight:900;letter-spacing:-1px;margin-bottom:4px;line-height:1.1}
.page-sub{font-size:14px;color:var(--g500);margin-bottom:20px;font-weight:500}
.section-label{font-size:11px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:var(--g400);margin-bottom:8px}

/* ── Cards ───────────────────────────────────────── */
.card{background:#fff;border:1.5px solid var(--g200);border-radius:var(--r16);padding:16px;margin-bottom:12px;box-shadow:var(--sh1)}

/* ── List Card ───────────────────────────────────── */
.list-card{
  background:#fff;border:1.5px solid var(--g200);border-radius:var(--r16);
  padding:16px 18px;margin-bottom:12px;box-shadow:var(--sh1);
  position:relative;overflow:hidden;transition:box-shadow .15s;
}
.list-card:active{box-shadow:var(--sh2)}
.list-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:4px;
  background:linear-gradient(180deg,var(--p-mid),var(--p-dark));
  border-radius:4px 0 0 4px;
}
.list-card-name{font-size:17px;font-weight:800;letter-spacing:-.3px;margin-bottom:4px}
.list-card-meta{font-size:12px;color:var(--g400);margin-bottom:10px;font-weight:500}

/* ── Stat Chips ──────────────────────────────────── */
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.chip{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:700}
.chip-purple{background:var(--p-light);color:var(--p-dark)}
.chip-gray{background:var(--g100);color:var(--g700)}
.chip-green{background:var(--green-l);color:var(--green)}
.chip-amber{background:var(--amber-l);color:var(--amber)}
.chip-red{background:var(--red-l);color:var(--red)}
.chip-blue{background:var(--blue-l);color:var(--blue)}

/* ── Buttons ─────────────────────────────────────── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  border-radius:var(--r12);font-weight:700;font-size:14px;padding:10px 18px;
  transition:all .15s;border:1.5px solid transparent;line-height:1;
}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.4;pointer-events:none}
.btn-primary{background:var(--p);color:#fff;box-shadow:0 2px 10px rgba(109,40,217,.3)}
.btn-primary:active{background:var(--p-dark)}
.btn-secondary{background:var(--p-light);color:var(--p-dark)}
.btn-secondary:active{background:#DDD6FE}
.btn-ghost{background:var(--g100);color:var(--g700)}
.btn-ghost:active{background:var(--g200)}
.btn-danger{background:var(--red-l);color:var(--red)}
.btn-amber{background:var(--amber-l);color:#92400E}
.btn-sm{font-size:13px;padding:7px 12px;border-radius:var(--r8)}
.btn-lg{font-size:16px;padding:13px 22px;border-radius:var(--r16)}
.btn-block{width:100%;justify-content:center}
.btn-xl{width:100%;font-size:18px;font-weight:900;padding:18px 24px;border-radius:var(--r20);letter-spacing:-.3px;justify-content:center}
.btn-call{
  background:linear-gradient(135deg,var(--p-dark) 0%,var(--p) 60%,#9333EA 100%);
  color:#fff;box-shadow:var(--shp);font-size:20px;font-weight:900;border-radius:var(--r20);
}
.btn-call:active{transform:scale(.97);box-shadow:0 2px 10px rgba(109,40,217,.25)}

/* ── Result Buttons ──────────────────────────────── */
.result-grid{display:grid;gap:8px}
.result-grid-2{grid-template-columns:1fr 1fr}
.result-grid-3{grid-template-columns:1fr 1fr 1fr}
.rbtn{
  padding:13px 6px;border-radius:var(--r12);font-size:13px;font-weight:800;
  text-align:center;border:2px solid transparent;transition:all .15s;
  letter-spacing:-.1px;line-height:1.2;
}
.rbtn:active{transform:scale(.96)}
.rbtn.sel{outline:3px solid var(--p);outline-offset:2px;transform:scale(1.02)}
.rbtn-selling  {background:var(--green-l);color:var(--green);border-color:#BBF7D0}
.rbtn-buying   {background:var(--blue-l);color:var(--blue);border-color:#BFDBFE}
.rbtn-callback {background:var(--p-light);color:var(--p-dark);border-color:#DDD6FE}
.rbtn-ni       {background:var(--g100);color:var(--g700);border-color:var(--g200)}
.rbtn-agent    {background:#E0F2FE;color:#0369A1;border-color:#BAE6FD}
.rbtn-dnc      {background:var(--g900);color:#fff;border-color:#000}
.rbtn-connected{background:var(--green-l);color:var(--green);border-color:#BBF7D0}
.rbtn-voicemail{background:var(--amber-l);color:var(--amber);border-color:#FDE68A}
.rbtn-no-answer{background:#FFF7ED;color:#C2410C;border-color:#FED7AA}
.rbtn-invalid  {background:var(--red-l);color:var(--red);border-color:#FECACA}
.rbtn-switched {background:#FFF1F2;color:#BE123C;border-color:#FECDD3}
.rbtn-closed   {background:var(--g900);color:#fff;border-color:#000}

/* ── Owner Profile Card ──────────────────────────── */
.owner-card{background:#fff;border:1.5px solid var(--g200);border-radius:var(--r16);overflow:hidden;margin-bottom:14px;box-shadow:var(--sh2)}
.owner-card-header{
  background:linear-gradient(135deg,var(--p-darker) 0%,var(--p-dark) 40%,var(--p) 100%);
  padding:18px 18px 16px;color:#fff;
}
.owner-card-name{font-size:21px;font-weight:900;letter-spacing:-.5px;margin-bottom:4px;line-height:1.2}
.owner-card-phone{font-size:24px;font-weight:800;letter-spacing:.5px;margin-bottom:4px;font-variant-numeric:tabular-nums}
.phone-edit-wrap{margin-bottom:10px}
.phone-edit-label{font-size:10px;font-weight:700;color:rgba(255,255,255,.5);letter-spacing:.8px;text-transform:uppercase;margin-bottom:3px}
.phone-edit{
  font-size:22px;font-weight:800;letter-spacing:.5px;
  background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.25);
  border-radius:var(--r8);color:#fff;width:100%;outline:none;
  padding:8px 12px;font-variant-numeric:tabular-nums;
  font-family:var(--font);transition:border-color .15s;
}
.phone-edit:focus{border-color:rgba(255,255,255,.7);background:rgba(255,255,255,.15)}
.phone-edit::placeholder{color:rgba(255,255,255,.4)}
.phone-edit-actions{display:flex;gap:8px;margin-top:6px;margin-bottom:8px}
.btn-save-phone{
  padding:5px 12px;border-radius:var(--r8);font-size:12px;font-weight:700;
  background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.25);
  transition:all .15s;
}
.btn-save-phone:active{background:rgba(255,255,255,.25)}
.phone-normalized-tag{
  font-size:11px;color:rgba(255,255,255,.6);font-weight:600;
  display:flex;align-items:center;gap:4px;
}

/* ── Multi-number phone list ─────────────────────── */
.phones-multi-wrap{margin-bottom:10px}
.phones-multi-label{font-size:10px;font-weight:700;color:rgba(255,255,255,.5);letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px}
.phone-entry{
  display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.15);
  border-radius:var(--r8);padding:10px 12px;margin-bottom:6px;
}
.phone-entry-info{flex:1;min-width:0}
.phone-entry-label{font-size:10px;font-weight:700;color:rgba(255,255,255,.45);letter-spacing:.6px;text-transform:uppercase;margin-bottom:2px}
.phone-entry-num{font-size:18px;font-weight:800;color:#fff;letter-spacing:.4px;font-variant-numeric:tabular-nums;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.phone-entry-call{
  flex-shrink:0;padding:8px 14px;border-radius:var(--r8);
  background:var(--p);color:#fff;font-size:13px;font-weight:800;
  text-decoration:none;transition:background .12s;
}
.phone-entry-call:active{background:var(--p-dark)}

/* ═══════════════════════════════════════════════════════════════
   PROFILE VIEW
═══════════════════════════════════════════════════════════════ */
.prof-hero{
  background:linear-gradient(160deg,var(--p-dark) 0%,var(--p) 55%,var(--p-mid) 100%);
  padding:36px 20px 28px;text-align:center;color:#fff;
  border-radius:0 0 var(--r24) var(--r24);margin-bottom:20px;
}
.prof-avatar-wrap{position:relative;display:inline-block;margin-bottom:14px}
.prof-avatar{
  width:90px;height:90px;border-radius:50%;
  background:rgba(255,255,255,.18);border:3px solid rgba(255,255,255,.5);
  display:flex;align-items:center;justify-content:center;
  font-size:38px;overflow:hidden;cursor:pointer;
}
.prof-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.prof-avatar-edit{
  position:absolute;bottom:0;right:0;width:28px;height:28px;border-radius:50%;
  background:var(--white);color:var(--p);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;box-shadow:var(--sh2);border:2px solid var(--p-light);cursor:pointer;
}
.prof-name{font-size:22px;font-weight:900;letter-spacing:-.3px;margin-bottom:3px}
.prof-tagline{font-size:13px;color:rgba(255,255,255,.7);font-weight:500}

.prof-section{margin:0 0 16px}
.prof-section-label{
  font-size:11px;font-weight:800;color:var(--g500);letter-spacing:.8px;
  text-transform:uppercase;padding:0 16px;margin-bottom:7px;
}
.prof-card{
  background:var(--white);border:1px solid var(--g200);
  border-radius:var(--r16);overflow:hidden;box-shadow:var(--sh1);
}
.prof-row{
  display:flex;align-items:center;gap:12px;padding:14px 16px;
  border-bottom:1px solid var(--g100);cursor:pointer;transition:background .12s;
}
.prof-row:last-child{border-bottom:none}
.prof-row:active{background:var(--g50)}
.prof-row-ico{
  width:36px;height:36px;border-radius:var(--r8);
  background:var(--p-xlight);color:var(--p);
  display:flex;align-items:center;justify-content:center;
  font-size:17px;flex-shrink:0;
}
.prof-row-ico.danger{background:var(--red-l);color:var(--red)}
.prof-row-ico.admin{background:#1e1b4b;color:#a5b4fc}
.prof-row-content{flex:1;min-width:0}
.prof-row-label{font-size:11px;color:var(--g500);font-weight:700;margin-bottom:2px;letter-spacing:.2px}
.prof-row-value{font-size:15px;font-weight:700;color:var(--g900);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prof-row-value.muted{color:var(--g400);font-weight:500}
.prof-row-action{font-size:20px;color:var(--g300);flex-shrink:0}

.prof-form{
  background:var(--g50);border-top:1px solid var(--g200);padding:16px;
}
.prof-field{margin-bottom:12px}
.prof-field label{
  font-size:11px;font-weight:800;color:var(--g500);letter-spacing:.6px;
  text-transform:uppercase;display:block;margin-bottom:5px;
}
.prof-field input,
.prof-field textarea{
  width:100%;padding:11px 13px;border:1.5px solid var(--g200);
  border-radius:var(--r8);font-size:15px;font-weight:600;
  background:var(--white);color:var(--g900);transition:border-color .15s;
  font-family:var(--font);
}
.prof-field input:focus,
.prof-field textarea:focus{border-color:var(--p);background:var(--white)}
.prof-field textarea{resize:vertical;min-height:90px;line-height:1.5}
.prof-form-actions{display:flex;gap:8px;margin-top:4px}
.prof-btn-save{
  flex:1;padding:11px;border-radius:var(--r8);font-size:14px;font-weight:800;
  background:var(--p);color:#fff;transition:background .15s;
}
.prof-btn-save:active{background:var(--p-dark)}
.prof-btn-cancel{
  padding:11px 16px;border-radius:var(--r8);font-size:14px;font-weight:700;
  background:var(--g200);color:var(--g700);
}
.prof-btn-danger{
  width:100%;padding:13px;border-radius:var(--r12);font-size:15px;font-weight:800;
  background:var(--red-l);color:var(--red);border:1.5px solid var(--red);
  transition:background .12s;
}
.prof-btn-danger:active{background:#fecaca}

/* Ticket cards in profile */
.ticket-card{
  border:1px solid var(--g200);border-radius:var(--r12);
  padding:14px;margin-bottom:10px;background:var(--white);
}
.ticket-subject{font-size:14px;font-weight:800;color:var(--g900);margin-bottom:3px}
.ticket-meta{font-size:11px;color:var(--g500);font-weight:600;margin-bottom:6px}
.ticket-body{font-size:13px;color:var(--g700);line-height:1.5}
.ticket-badge{
  display:inline-block;font-size:10px;font-weight:800;letter-spacing:.6px;
  text-transform:uppercase;padding:2px 8px;border-radius:999px;margin-top:7px;
}
.ticket-badge.open{background:var(--amber-l);color:var(--amber)}
.ticket-badge.resolved{background:var(--green-l);color:var(--green)}

/* ═══════════════════════════════════════════════════════════════
   ADMIN PANEL
═══════════════════════════════════════════════════════════════ */
.admin-hero{
  background:linear-gradient(135deg,#09090b 0%,#1e1b4b 50%,#312e81 100%);
  color:#fff;padding:28px 20px;border-radius:0 0 var(--r24) var(--r24);margin-bottom:20px;
  text-align:center;
}
.admin-chip{
  display:inline-block;background:var(--amber);color:#000;
  font-size:10px;font-weight:900;letter-spacing:1px;text-transform:uppercase;
  padding:3px 11px;border-radius:999px;margin-bottom:12px;
}
.admin-title{font-size:24px;font-weight:900;color:#fff;margin-bottom:4px}
.admin-sub{font-size:13px;color:rgba(255,255,255,.55);font-weight:500}
.admin-stats{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:20px;
}
.admin-stat{
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);
  border-radius:var(--r12);padding:14px;text-align:center;
}
.admin-stat-n{font-size:30px;font-weight:900;color:#fff;line-height:1}
.admin-stat-l{font-size:11px;color:rgba(255,255,255,.55);font-weight:600;margin-top:4px}

.admin-section{margin:0 0 16px}
.admin-section-label{
  font-size:11px;font-weight:800;color:var(--g500);letter-spacing:.8px;
  text-transform:uppercase;padding:0 16px;margin-bottom:7px;
}
.admin-card{
  background:var(--white);border:1px solid var(--g200);
  border-radius:var(--r16);overflow:hidden;box-shadow:var(--sh1);
}
.admin-ticket{
  padding:14px 16px;border-bottom:1px solid var(--g100);
}
.admin-ticket:last-child{border-bottom:none}
.admin-ticket-head{
  display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:4px;
}
.admin-ticket-subject{font-size:14px;font-weight:800;color:var(--g900);flex:1}

<script>
'use strict';

// ══════════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════════
const S = {
  view:     'dashboard',
  lists:    [],
  listId:   null,
  ownerIdx: 0,
  filter:   'all',
  search:   '',
  noteTab:  'call',      // active note tab: call | callback | selling | buying
  uploadRows:   null,
  uploadErrors: [],
};

// ══════════════════════════════════════════════════════════════════
// PERSISTENCE
// ══════════════════════════════════════════════════════════════════
function persist() {
  try { localStorage.setItem('pd4', JSON.stringify(S.lists)); } catch(e) {}
}
function restore() {
  try { const r = localStorage.getItem('pd4'); if (r) S.lists = JSON.parse(r); } catch(e) {}
}

// ══════════════════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════════════════
const uid     = () => Math.random().toString(36).slice(2) + Date.now().toString(36);
const esc     = s  => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmtDate = d  => d ? new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) : '—';
const fmtTime = d  => d ? new Date(d).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}) : '';
const initials= n  => (n||'?').split(' ').map(w=>w[0]).filter(Boolean).slice(0,2).join('').toUpperCase();

function statusClass(o) {
  if (o.doNotCall) return 'dnc';
  if (o.agent) return 'agent';
  if (o.leadCategory === 'callback') return 'callback';
  if (o.callStatus === 'connected') return 'connected';
  if (['voicemail','no_answer'].includes(o.callStatus)) return 'voicemail';
  if (['invalid','switched_off','closed'].includes(o.callStatus)) return 'invalid';
  return '';
}

function statusLabel(o) {
  if (o.doNotCall) return 'Do Not Call';
  if (o.agent) return 'Agent';
  const lmap = {selling:'Selling',buying:'Buying',callback:'Callback',not_interested:'Not Interested'};
  if (o.leadCategory && lmap[o.leadCategory]) return lmap[o.leadCategory];
  const smap = {connected:'Connected',voicemail:'Voicemail',no_answer:'No Answer',
    invalid:'Invalid No.',switched_off:'Switched Off',closed:'Closed No.'};
  if (o.callStatus && smap[o.callStatus]) return smap[o.callStatus];
  return 'Uncalled';
}

function statusBadgeCls(o) {
  if (o.doNotCall) return 'bdg-dark';
  if (o.agent) return 'bdg-blue';
  if (o.leadCategory === 'selling') return 'bdg-green';
  if (o.leadCategory === 'buying') return 'bdg-blue';
  if (o.leadCategory === 'callback') return 'bdg-purple';
  if (o.callStatus === 'connected') return 'bdg-green';
  if (['voicemail','no_answer'].includes(o.callStatus)) return 'bdg-amber';
  if (['invalid','switched_off','closed'].includes(o.callStatus)) return 'bdg-red';
  return 'bdg-gray';
}

function getList(id) { return S.lists.find(l => l.id === (id ?? S.listId)); }
function curList()   { return getList(S.listId); }

function stats(list) {
  const o = list.owners;
  return {
    total:    o.length,
    called:   o.filter(x => x.callStatus).length,
    connected:o.filter(x => x.callStatus === 'connected').length,
    voicemail:o.filter(x => ['voicemail','no_answer'].includes(x.callStatus)).length,
    invalid:  o.filter(x => ['invalid','switched_off','closed'].includes(x.callStatus)).length,
    callback: o.filter(x => x.leadCategory === 'callback').length,
    selling:  o.filter(x => x.leadCategory === 'selling').length,
    buying:   o.filter(x => x.leadCategory === 'buying').length,
    ni:       o.filter(x => x.leadCategory === 'not_interested').length,
    agent:    o.filter(x => x.agent).length,
    dnc:      o.filter(x => x.doNotCall).length,
  };
}

// ══════════════════════════════════════════════════════════════════
// PHONE NORMALIZATION
// Converts any raw number into +[countrycode][number] format
// based on the owner's Country field.
// ══════════════════════════════════════════════════════════════════

// Country name / alias → dial code
const DIAL_CODES = {
  // Gulf & Middle East
  'uae':971,'united arab emirates':971,'emirates':971,'u.a.e':971,'u.a.e.':971,'dubai':971,'abu dhabi':971,
  'saudi arabia':966,'ksa':966,'saudi':966,'kingdom of saudi arabia':966,'ksa ':966,
  'kuwait':965,'qatar':974,'bahrain':973,'oman':968,
  'jordan':962,'lebanon':961,'egypt':20,'iraq':964,'iran':98,
  'israel':972,'palestine':970,'syria':963,'turkey':90,'turkiye':90,
  'yemen':967,'libya':218,'morocco':212,'tunisia':216,'algeria':213,
  'sudan':249,'somalia':252,
  // Asia
  'india':91,'pakistan':92,'bangladesh':880,'sri lanka':94,'nepal':977,
  'china':86,'japan':81,'south korea':82,'korea':82,'north korea':850,
  'philippines':63,'indonesia':62,'malaysia':60,'singapore':65,
  'thailand':66,'vietnam':84,'hong kong':852,'taiwan':886,'macau':853,
  'myanmar':95,'cambodia':855,'laos':856,'mongolia':976,
  'uzbekistan':998,'kazakhstan':7,'afghanistan':93,
  // Europe
  'uk':44,'united kingdom':44,'britain':44,'england':44,'great britain':44,'scotland':44,'wales':44,

function getDialCode(country) {
  if (!country) return null;
  const key = String(country).toLowerCase().trim().replace(/\.$/, '');
  if (DIAL_CODES[key] !== undefined) return DIAL_CODES[key];
  for (const [k, v] of Object.entries(DIAL_CODES)) {
    if (key.includes(k) || k.includes(key)) return v;
  }
  return null;
}

// Unique dial code strings sorted longest-first so 357 matches before 35 or 3
const SORTED_CODE_STRS = (() => {
  const unique = [...new Set(Object.values(DIAL_CODES).map(String))];
  return unique.sort((a, b) => b.length - a.length);
})();

// Per-country valid total digit lengths [min, max] (country code digits + national number digits).
// A number must both START with the code AND have a length within this range to be accepted.
// Example: '971' UAE requires 11–12 total digits — so "9715" (4 digits) is rejected
// and falls through to the country-fallback instead.
const CODE_LENGTH_RULES = {
  // Gulf & Middle East
  '971': [11, 12], '966': [12, 13], '965': [11, 11], '974': [11, 11],
  '973': [11, 11], '968': [11, 12], '962': [11, 12], '961': [10, 11],
  '20':  [11, 12], '964': [12, 13], '98':  [11, 12], '972': [11, 12],
  '970': [11, 12], '963': [11, 12], '90':  [12, 12], '967': [12, 12],
  '212': [11, 12], '213': [12, 12], '216': [11, 11], '218': [11, 12],
  '249': [12, 12], '252': [11, 12],
  // Europe
  '1':   [11, 11], '7':   [11, 11], '44':  [12, 12], '33':  [11, 11],
  '49':  [11, 13], '39':  [10, 12], '34':  [11, 11], '351': [12, 12],
  '31':  [11, 11], '32':  [11, 11], '352': [10, 13], '41':  [11, 12],
  '43':  [11, 13], '46':  [11, 12], '47':  [10, 11], '45':  [10, 10],
  '358': [11, 12], '353': [11, 12], '354': [11, 11], '48':  [11, 11],
  '380': [11, 12], '375': [12, 12], '30':  [12, 12], '357': [11, 11],
  '356': [11, 11], '36':  [11, 12], '40':  [11, 11], '359': [11, 12],
  '420': [12, 12], '421': [12, 12], '386': [11, 11], '385': [11, 12],
  '381': [11, 12], '370': [11, 11], '371': [11, 11], '372': [10, 11],
  '373': [11, 11], '355': [11, 12], '389': [11, 11], '377': [10, 11],
  // Asia Pacific
  '91':  [12, 12], '92':  [12, 12], '880': [12, 13], '94':  [11, 11],
  '977': [12, 12], '93':  [12, 12], '86':  [13, 13], '81':  [11, 12],
  '82':  [11, 12], '63':  [12, 12], '62':  [11, 13], '60':  [10, 12],
  '65':  [10, 10], '66':  [11, 11], '84':  [11, 12], '95':  [11, 12],
  '855': [11, 11], '856': [11, 12], '852': [11, 11], '886': [11, 12],
  '853': [11, 11], '976': [11, 11], '998': [12, 12],
  // Oceania
  '61':  [11, 11], '64':  [10, 12], '679': [10, 10],
  // Americas
  '52':  [12, 12], '55':  [12, 13], '54':  [12, 13], '57':  [12, 12],
  '56':  [11, 11], '51':  [11, 12], '58':  [11, 11], '507': [11, 11],
  '506': [11, 11], '502': [12, 12], '504': [12, 12], '503': [11, 11],
  '505': [11, 11], '53':  [10, 11],
  // Africa
  '27':  [11, 11], '234': [13, 14], '254': [12, 12], '251': [12, 12],
  '233': [12, 12], '255': [12, 12], '256': [12, 12], '250': [12, 12],
  '221': [12, 12], '237': [12, 12], '244': [12, 12], '260': [12, 12],
  '263': [12, 13], '267': [11, 11], '264': [12, 12],
};

// Returns the matched dial code string if `digits` begins with a known country
// code AND the total digit count falls within that country's valid range.
// Returns null if the number is too short, too long, or unrecognised — so the
// caller can fall back to the contact's Country field instead.
function detectCodeInNumber(digits) {
  for (const code of SORTED_CODE_STRS) {
    if (!digits.startsWith(code)) continue;
    const rule = CODE_LENGTH_RULES[code];
    if (rule) {
      const [min, max] = rule;
      if (digits.length >= min && digits.length <= max) return code;
      // Prefix matched but length is wrong — number is too short/long for this
      // country. Stop here; don't let a shorter code (e.g. '97' or '9') match
      // the same prefix and produce a nonsense result.
      if (digits.length < min) return null;
    } else {
      // Code not in length map — conservative generic guard
      const minLen = code.length <= 2 ? 11 : code.length + 7;
      if (digits.length >= minLen) return code;
    }
  }
  return null;
}

function normalizePhone(raw, country) {
  if (!raw) return '';
  // Strip formatting — keep only digits and a leading +
  let num = String(raw).replace(/[\s\-\.\(\)\/\\]/g, '').replace(/[^\d+]/g, '');
  if (!num) return '';

  // Already in international format
  if (num.startsWith('+')) return num;

  // 00XXXX → +XXXX (international dial prefix)
  if (num.startsWith('00')) return '+' + num.slice(2);

  // Strip a single leading trunk zero (e.g. 0971… or 07911…)
  const stripped = num.startsWith('0') ? num.slice(1) : num;

  // ── Step 1: detect if the number itself already contains a country code ──
  // The contact's Country field is NOT consulted here.
  // Example: country=Cyprus but number starts with 971 → returns +971…
  const detected = detectCodeInNumber(stripped);
  if (detected) return '+' + stripped;

  // ── Step 2: fallback — use the contact's Country field ──
  // Only reached when no known code was found in the number itself.
  const dialCode = getDialCode(country);
  if (!dialCode) return stripped; // Unknown country — return cleaned digits

  return '+' + String(dialCode) + stripped;
}

// ══════════════════════════════════════════════════════════════════
// DATA MODEL
// ══════════════════════════════════════════════════════════════════
const COLS = ['Date','Procedure Value','Area','Project','Building Name','Size','Unit Number','Owner Name','Mobile','2nd No.','Country'];

// Split a raw cell value into individual phone strings.
// Separators recognised: comma, slash, backslash, or a dash/en-dash surrounded by spaces.
// A plain dash with no surrounding spaces is treated as phone formatting (e.g. +971-50-123-4567).
function splitPhoneNumbers(raw) {
  if (!raw) return [];
  const str = String(raw).trim();
  if (!str) return [];
  return str
    .split(/[,\/\\]|\s+[-–—]\s+/)
    .map(p => p.trim())
    .filter(Boolean);
}

// Returns all normalised phones for an owner, falling back gracefully for older records.
function getOwnerPhones(o) {
  if (o.phones && o.phones.length > 0) return o.phones;
  if (o.mobile) return [o.mobile];
  return [];
}

function mkOwner(row) {
  return {
    id:             uid(),
    date:           String(row['Date'] ?? ''),
    procedureValue: String(row['Procedure Value'] ?? ''),
    area:           String(row['Area'] ?? ''),
    project:        String(row['Project'] ?? ''),
    buildingName:   String(row['Building Name'] ?? ''),
    size:           String(row['Size'] ?? ''),
    unitNumber:     String(row['Unit Number'] ?? ''),
    ownerName:      String(row['Owner Name'] ?? ''),
    country:        String(row['Country'] ?? ''),
    phones:         (() => {
      const country = String(row['Country'] ?? '');
      const detected = splitPhoneNumbers(String(row['Mobile'] ?? ''))
        .map(n => normalizePhone(n, country)).filter(Boolean);
      const second = String(row['2nd No.'] ?? '').trim();
      if (second) {
        const n2 = normalizePhone(second, country);
        if (n2 && !detected.includes(n2)) detected.push(n2);
      }
      return detected;
    })(),
    mobile:         normalizePhone(String(row['Mobile'] ?? '').split(/[,\/\\]|\s+[-–—]\s+/)[0]?.trim() || '', String(row['Country'] ?? '')),
    // call tracking
    callStatus:    null,
    leadCategory:  null,
    // notes — split into 4 sections
    note_call:     '',
    note_callback: '',
    note_selling:  '',
    note_buying:   '',
    // callback scheduling
    callbackDate:  '',
    callbackTime:  '',
    // stats
    attempts:      0,
    retryUsed:     false,
    lastCalledAt:  null,
    callConnected: false,
    doNotCall:     false,
    agent:         false,
    finalResult:   '',
    history:       [],
  };
}

// Safely read a note field, handling old single-notes format
function getNote(o, field) {
  const key = 'note_' + field;
  if (o[key] !== undefined) return o[key];
  // Migrate: put old notes into call tab
  if (field === 'call' && o.notes) return o.notes;
  return '';
}

function mkList(name, owners) {
  return { id: uid(), name, owners, uploadDate: Date.now(), lastUsed: null };
}

function nav(view, params = {}) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));

  S.view = view;
  if (params.listId !== undefined) S.listId  = params.listId;
  if (params.idx    !== undefined) S.ownerIdx = params.idx;
  if (params.filter !== undefined) S.filter  = params.filter;
  if (params.search !== undefined) S.search  = params.search;

  const vel = document.getElementById('view-' + view);
  if (vel) vel.classList.add('active');
  const tel = document.querySelector(`[data-tab="${view}"]`);
  if (tel) tel.classList.add('active');

  renderView(view);
  window.scrollTo(0, 0);
  updateCallbackBadge();
}

function renderView(v) {
  ({dashboard:renderDashboard,upload:renderUpload,list:renderList,
    calling:renderCalling,callbacks:renderCallbacks,profile:renderProfile})[v]?.();
  renderNav();
}

function renderNav() {
  const nr = document.getElementById('nav-right');
  if (S.view === 'calling') {
    nr.innerHTML = `<button class="nav-btn nav-btn-ghost" onclick="nav('list',{listId:S.listId})">✕ Exit</button>`;
  } else if (S.view === 'list') {
    nr.innerHTML = `
      <button class="nav-btn nav-btn-ghost" onclick="showListMenu()">⋯</button>
      <button class="nav-btn nav-btn-primary" onclick="startCalling()">▶ Call</button>`;
  } else { nr.innerHTML = ''; }
}

function updateCallbackBadge() {
  const count = S.lists.reduce((n,l) => n + l.owners.filter(o => o.leadCategory === 'callback').length, 0);
  const tab   = document.getElementById('tab-callbacks');
  tab?.querySelector('.tab-badge')?.remove();
  if (count > 0 && tab) {
    const b = document.createElement('div');
    b.className = 'tab-badge';
    b.textContent = count > 9 ? '9+' : count;
    tab.appendChild(b);
  }
}

  const el = document.getElementById('view-upload');

    <button class="btn btn-secondary btn-block mb16" onclick="downloadTemplate()">📥 Download Excel Template</button>

      <div class="upload-zone-icon">📂</div>

    </div>

  const zone = document.getElementById('upzone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('drag-over'); handleFile(e.dataTransfer.files[0]); });
  document.getElementById('file-inp').onchange = e => { if(e.target.files[0]) handleFile(e.target.files[0]); };
}

function downloadTemplate() {
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet([COLS]);
  ws['!cols'] = COLS.map(() => ({wch:18}));
  XLSX.utils.book_append_sheet(wb, ws, 'Owners');
  XLSX.writeFile(wb, 'PropDial_Template.xlsx');
  toast('Template downloaded', 'ok');
}

function handleFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb   = XLSX.read(e.target.result, {type:'binary'});
      const ws   = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
      parseUpload(rows, file.name);
    } catch(err) { toast('Could not read file — use the template.', 'err'); }
  };
  reader.readAsBinaryString(file);
}

function parseUpload(rows, filename) {
  const errs = [], owners = [];
  rows.forEach((row, i) => {
    if (!row['Owner Name'] && !row['Mobile']) return;
    if (!row['Owner Name']) errs.push(`Row ${i+2}: Missing Owner Name`);
    if (!row['Mobile'])     errs.push(`Row ${i+2}: Missing Mobile`);
    owners.push(mkOwner(row));
  });
  S.uploadRows   = owners;
  S.uploadErrors = errs;
  showUploadPreview(owners, errs, filename.replace(/\.[^.]+$/,'').replace(/[_-]/g,' '));
}

function showUploadPreview(owners, errs, defName) {
  document.getElementById('up-preview').innerHTML = `
    <div class="hr"></div>

        <div style="font-weight:800;color:#92400E;margin-bottom:5px">⚠ ${errs.length} Warning${errs.length!==1?'s':''}</div>
        ${errs.slice(0,5).map(e=>`<div style="font-size:13px;color:#92400E">${esc(e)}</div>`).join('')}
        ${errs.length>5?`<div style="font-size:12px;color:#92400E;margin-top:3px">+${errs.length-5} more</div>`:''}
      </div>` : ''}
    <div style="background:var(--green-l);border:1px solid #BBF7D0;border-radius:var(--r8);padding:12px 14px;margin-bottom:14px;font-weight:800;color:var(--green)">
      ✓ ${owners.length} owner${owners.length!==1?'s':''} ready to import
    </div>
    <div class="form-group">
      <label class="form-label">List Name</label>
      <input class="form-input" id="list-name" value="${esc(defName)}" placeholder="e.g. Serenia Owners June 2026">
    </div>
    <div class="text-xs text-gray mb8">Preview (first 3 rows)</div>
    ${(() => {
      const normalized = owners.filter(o => o.mobile).length;

      return `<div style="background:var(--p-xlight);border:1px solid var(--p-mid);border-radius:var(--r8);padding:10px 14px;margin-bottom:14px;font-size:13px;color:var(--p-dark);font-weight:600">
        📞 ${withCode} / ${normalized} numbers successfully converted to international format
      </div>`;
    })()}
    ${owners.slice(0,3).map(o=>`
      <div style="border:1px solid var(--g200);border-radius:var(--r8);padding:10px 12px;margin-bottom:7px">
        <div style="font-weight:800;font-size:14px">${esc(o.ownerName)||'(no name)'}</div>
        <div style="font-size:12px;color:var(--g500);margin-top:2px">${esc(o.project)||'—'} · ${esc(o.buildingName)||'—'} · Unit ${esc(o.unitNumber)||'—'}</div>
        <div style="font-size:13px;font-weight:700;color:${o.mobile.startsWith('+')?'var(--green)':'var(--amber)'};margin-top:4px">
          📞 ${esc(o.mobile)||'No number'} ${o.country?'('+esc(o.country)+')':''}
        </div>
      </div>`).join('')}
    <button class="btn btn-primary btn-xl mt8" onclick="saveUpload()">Save List · ${owners.length} Owners</button>`;
}

function saveUpload() {
  const name = document.getElementById('list-name')?.value?.trim();
  if (!name)             { toast('Enter a list name', 'err'); return; }
  if (!S.uploadRows?.length) { toast('No owner data found', 'err'); return; }
  const list = mkList(name, S.uploadRows);
  S.lists.unshift(list);
  persist();
  S.uploadRows = null; S.uploadErrors = [];
  document.getElementById('file-inp').value = '';
  toast(`"${name}" saved — ${list.owners.length} owners`, 'ok');
  nav('list', {listId: list.id});
}

        oninput="S.search=this.value;renderList()">

      ${FILTERS.map(f=>`<div class="fcip ${S.filter===f.k?'on':''}" onclick="S.filter='${f.k}';S.search='';document.getElementById('search-inp').value='';renderList()">${f.label}</div>`).join('')}

function filteredOwners(list) {
  let o = list.owners;
  if (S.search) {
    const q = S.search.toLowerCase();
    o = o.filter(x =>
      (x.ownerName||'').toLowerCase().includes(q) ||
      (x.mobile||'').includes(q) ||
      (x.project||'').toLowerCase().includes(q) ||
      (x.buildingName||'').toLowerCase().includes(q) ||
      (x.unitNumber||'').toLowerCase().includes(q) ||
      (x.area||'').toLowerCase().includes(q)
    );
  }
  const f = S.filter;
  if (f==='all')           return o;
  if (f==='uncalled')      return o.filter(x => !x.callStatus && !x.doNotCall);
  if (f==='connected')     return o.filter(x => x.callStatus === 'connected');
  if (f==='voicemail')     return o.filter(x => ['voicemail','no_answer'].includes(x.callStatus));
  if (f==='callback')      return o.filter(x => x.leadCategory === 'callback');
  if (f==='selling')       return o.filter(x => x.leadCategory === 'selling');
  if (f==='buying')        return o.filter(x => x.leadCategory === 'buying');
  if (f==='not_interested')return o.filter(x => x.leadCategory === 'not_interested');
  if (f==='agent')         return o.filter(x => x.agent);
  if (f==='dnc')           return o.filter(x => x.doNotCall);
  if (f==='invalid')       return o.filter(x => ['invalid','switched_off','closed'].includes(x.callStatus));
  return o;
}

function ownerRow(o, idx) {
  const sc = statusClass(o);
  return `
    <div class="orow s-${sc}" onclick="openOwnerCall(${idx})">
      <div class="orow-av">${esc(initials(o.ownerName))}</div>
      <div class="orow-info">
        <div class="orow-name">${esc(o.ownerName)||'(No Name)'}</div>
        <div class="orow-meta">${esc(o.mobile)||'—'} · ${esc(o.project)||'—'} · ${esc(o.buildingName)||'—'}${o.unitNumber?' #'+esc(o.unitNumber):''}</div>
      </div>
      <div class="sdot ${sc||'none'}"></div>
    </div>`;
}

function saveNote(field, val) {

// ══════════════════════════════════════════════════════════════════
// SAVE TO CONTACTS (vCard / .vcf)
// On iPhone Safari, downloading a .vcf file triggers iOS to show
// "Add Contact?" — no permissions or native APIs required.
// ══════════════════════════════════════════════════════════════════

function toTitleCase(str) {
  // Converts "AHMAD MOHAMMED AL-RASHID" → "Ahmad Mohammed Al-Rashid"
  return (str || '')
    .toLowerCase()
    .replace(/\b([a-z])/g, c => c.toUpperCase());
}

function vEscape(str) {
  // Escape special chars for vCard 3.0 property values
  return String(str || '')
    .replace(/\\/g, '\\\\')
    .replace(/;/g, '\\;')
    .replace(/,/g, '\\,')
    .replace(/\n/g, '\\n')
    .replace(/\r/g, '');
}

function saveContact() {
  const list = curList(); if (!list) return;
  const o = list.owners[S.ownerIdx]; if (!o) return;

  const name      = toTitleCase(o.ownerName || 'Unknown Owner');
  const nameParts = name.trim().split(/\s+/);
  const firstName = nameParts[0] || '';
  const lastName  = nameParts.slice(1).join(' ') || '';
  const phones    = getOwnerPhones(o);
  const phone     = getCurrentPhone() || phones[0] || '';

  // Property information block
  const propLines = [
    o.country        ? `Country: ${o.country}`                : '',
    o.buildingName   ? `Building: ${o.buildingName}`          : '',
    o.unitNumber     ? `Unit Number: ${o.unitNumber}`         : '',
    o.size           ? `Size: ${o.size}`                      : '',
    o.procedureValue ? `Procedure Value: ${o.procedureValue}` : '',
    o.date           ? `Transaction Date: ${o.date}`          : '',
  ].filter(Boolean);

  // Call notes block — one entry per note tab that has content, each dated today
  const today = new Date().toLocaleDateString('en-GB', {day:'2-digit',month:'2-digit',year:'numeric'});
  const callNoteText    = (o.note_call    || '').trim();
  const callbackText    = (o.note_callback|| '').trim();
  const sellingText     = (o.note_selling || '').trim();
  const buyingText      = (o.note_buying  || '').trim();

  const noteLines = [...propLines];

  if (callNoteText || callbackText || sellingText || buyingText) {
    noteLines.push(''); // blank separator between property info and notes
    if (callNoteText) {
      noteLines.push(`Notes made on ${today}:`);
      noteLines.push(callNoteText);
    }
    if (callbackText) {
      if (callNoteText) noteLines.push('');
      noteLines.push(`Callback Notes (${today}):`);
      noteLines.push(callbackText);
    }
    if (sellingText) {
      if (callNoteText || callbackText) noteLines.push('');
      noteLines.push(`Selling Details (${today}):`);
      noteLines.push(sellingText);
    }
    if (buyingText) {
      if (callNoteText || callbackText || sellingText) noteLines.push('');
      noteLines.push(`Buying Requirements (${today}):`);
      noteLines.push(buyingText);
    }
  }

  // vCard NOTE field — lines joined with literal \n (vCard 3.0 line-break encoding)
  const noteValue = noteLines.map(vEscape).join('\\n');

  const lines = [
    'BEGIN:VCARD',
    'VERSION:3.0',
    `FN:${vEscape(name)}`,
    `N:${vEscape(lastName)};${vEscape(firstName)};;;`,
    ...phones.length > 1
      ? phones.map((p,i) => `TEL;TYPE=CELL${i===0?',PREF':''}:${vEscape(p)}`)
      : (phone ? [`TEL;TYPE=CELL:${vEscape(phone)}`] : []),
    noteLines.length ? `NOTE:${noteValue}` : null,
    'END:VCARD',
  ].filter(l => l !== null).join('\r\n');

  const blob = new Blob([lines], { type: 'text/vcard;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = name.replace(/\s+/g, '_') + '.vcf';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast(`Contact ready — tap the file to add ${firstName} to iPhone Contacts`, 'ok');
}

// Returns the current phone value from the editable field (falls back to owner.mobile)
function getCurrentPhone() {
  const inp = document.getElementById('phone-edit');
  return inp ? inp.value.trim() : (curList()?.owners[S.ownerIdx]?.mobile || '');
}

// Called on every keystroke in the phone input — no save yet, just live
function onPhoneEdit(val) {
  // Nothing to do — callOwner() reads live from the input
}

// Save the edited number permanently to the owner record
function saveEditedPhone() {
  const list = curList(); if (!list) return;
  const o = list.owners[S.ownerIdx]; if (!o) return;
  const val = getCurrentPhone();
  if (!val) { toast('Enter a number first', 'err'); return; }
  o.mobile = val;
  persist();
  toast('Number saved ✓', 'ok');
}

// Re-normalize the current number in the input using the owner's country
function reNormalizePhone() {
  const list = curList(); if (!list) return;
  const o = list.owners[S.ownerIdx]; if (!o) return;
  const inp = document.getElementById('phone-edit');
  if (!inp) return;
  const normalized = normalizePhone(inp.value, o.country);
  inp.value = normalized;
  o.mobile = normalized;
  persist();
  toast('Re-normalized: ' + normalized, 'ok');
}

// Dial using the current phone input value
function callOwner() {
  const num = getCurrentPhone();
  if (!num) { toast('No phone number', 'err'); return; }
  recordAttempt();
  window.location.href = 'tel:' + num;
}

// ── Retry Once ───────────────────────────────────────────────────
function doRetry() {
  const list = curList(); if (!list) return;
  const o = list.owners[S.ownerIdx]; if (!o) return;
  o.retryUsed   = true;
  o.attempts    = (o.attempts || 0) + 1;
  o.lastCalledAt= Date.now();
  o.callStatus  = null;  // Reset so user marks fresh result after retry
  persist();
  renderCalling();
  // Dial using the current phone input value
  const num = getCurrentPhone();
  if (num) window.location.href = 'tel:' + num;

function recordAttempt() {
  const list = curList(); if (!list) return;
  const o = list.owners[S.ownerIdx]; if (!o) return;
  o.attempts    = (o.attempts || 0) + 1;
  o.lastCalledAt= Date.now();
  persist();
  setTimeout(() => {
    const bdg = document.getElementById('owner-badges');
    if (bdg) bdg.innerHTML = ownerBadges(o);
  }, 400);
}

function saveCallback() {
  const list = curList(); if (!list) return;
  const o = list.owners[S.ownerIdx]; if (!o) return;
  const d = document.getElementById('cb-date');
  const t = document.getElementById('cb-time');
  if (d) o.callbackDate = d.value;
  if (t) o.callbackTime = t.value;
  persist();
}

function setLead(cat) {
  const list = curList(); if (!list) return;
  const o = list.owners[S.ownerIdx]; if (!o) return;

  if (cat === 'do_not_call') {
    o.doNotCall    = !o.doNotCall;
    o.leadCategory = o.doNotCall ? 'do_not_call' : null;
    o.agent        = false;
  } else if (cat === 'agent') {
    o.agent        = !o.agent;
    o.leadCategory = o.agent ? 'agent' : null;
    o.doNotCall    = false;
  } else {
    o.leadCategory = (o.leadCategory === cat) ? null : cat;
    o.doNotCall    = false;
    o.agent        = false;
  }
  persist();

  // Show/hide callback fields
  const cbf = document.getElementById('cb-fields');
  if (cbf) cbf.style.display = (o.leadCategory === 'callback') ? 'block' : 'none';

  // Update lead grid selection
  const LEAD_KEYS = ['selling','buying','callback','not_interested','agent','do_not_call'];
  document.getElementById('lead-grid')?.querySelectorAll('.rbtn').forEach((btn,i) => {
    const k = LEAD_KEYS[i];
    btn.classList.toggle('sel',
      k==='do_not_call' ? o.doNotCall : k==='agent' ? o.agent : o.leadCategory===k);
  });

  // DNC bar
  const existing = document.querySelector('.dnc-bar');
  if (o.doNotCall && !existing) {
    document.getElementById('view-calling').insertAdjacentHTML('afterbegin',
      `<div class="dnc-bar">⛔ Do Not Call — this owner will be skipped in auto-calling</div>`);
  } else if (!o.doNotCall && existing) { existing.remove(); }

  // Update badges
  const bdg = document.getElementById('owner-badges');
  if (bdg) bdg.innerHTML = ownerBadges(o);
}

function setStatus(st) {
  const list = curList(); if (!list) return;
  const o = list.owners[S.ownerIdx]; if (!o) return;

  const prev = o.callStatus;
  o.callStatus   = (o.callStatus === st) ? null : st;
  if (o.callStatus === 'connected') o.callConnected = true;
  persist();

  // Update status grid
  const STAT_KEYS = ['connected','voicemail','no_answer','invalid','switched_off','closed'];
  document.getElementById('status-grid')?.querySelectorAll('.rbtn').forEach((btn,i) => {
    btn.classList.toggle('sel', o.callStatus === STAT_KEYS[i]);
  });

  // Show/hide retry banner dynamically
  const retryBanner  = document.getElementById('retry-banner');
  const showRetry    = ['voicemail','no_answer'].includes(o.callStatus) && !o.retryUsed;
  const retryArea    = document.getElementById('retry-banner') || document.querySelector('[id^="retry"]');

  // Re-render retry section if voicemail/no-answer selected for the first time
  if (showRetry && !retryBanner) {
    // Insert retry banner before notes section
    const notesLabel = document.querySelector('#view-calling .section-label');
    if (notesLabel) {
      notesLabel.insertAdjacentHTML('beforebegin', `
        <div class="retry-banner" id="retry-banner">
          <div class="retry-banner-title">📬 Went to voicemail?</div>
          <div class="retry-banner-sub">You get one retry before moving on. Tap below to call again.</div>
          <a href="tel:${esc(o.mobile)}" onclick="doRetry()" class="btn-retry">🔄 Retry Call Once</a>
        </div>`);
    }
  } else if (!showRetry && retryBanner) {
    retryBanner.remove();
  }

  // Update badges
  const bdg = document.getElementById('owner-badges');
  if (bdg) bdg.innerHTML = ownerBadges(o);
}

function saveAndNext() {
  const list = curList(); if (!list) return;
  const o = list.owners[S.ownerIdx];
  if (o) { saveCallback(); persist(); toast('Saved ✓','ok'); }
  moveOwner(1);
}

function moveOwner(dir) {
  const list = curList(); if (!list) return;
  let idx = S.ownerIdx + dir;
  if (dir > 0) { while (idx < list.owners.length && list.owners[idx]?.doNotCall) idx++; }
  if (idx < 0) idx = 0;
  if (idx >= list.owners.length) { toast('🎉 End of list — all owners called!','ok'); nav('list',{listId:S.listId}); return; }
  S.ownerIdx = idx;
  renderCalling();
  window.scrollTo(0,0);
}

function skipOwner() { moveOwner(1); }

// CALLBACKS VIEW
// ══════════════════════════════════════════════════════════════════
function renderCallbacks() {
  const el = document.getElementById('view-callbacks');
  const all = [];
  S.lists.forEach(list => list.owners.forEach((o,i) => {
    if (o.leadCategory === 'callback') all.push({o, list, idx:i});
  }));

  if (all.length === 0) {
    el.innerHTML = `
      <div class="page-title">Callbacks</div>
      <div class="page-sub">Scheduled follow-ups</div>
      <div class="empty">
        <div class="empty-ico">📅</div>
        <div class="empty-title">No callbacks</div>
        <div class="empty-sub">Mark owners as "Call Back" during a call session to schedule them here</div>
      </div>`;
    return;
  }

  const now = new Date(); now.setHours(0,0,0,0);
  const sortByDate = arr => [...arr].sort((a,b) => {
    const da = new Date((a.o.callbackDate||'9999')+' '+(a.o.callbackTime||'00:00'));
    const db = new Date((b.o.callbackDate||'9999')+' '+(b.o.callbackTime||'00:00'));
    return da - db;
  });

  const overdue = sortByDate(all.filter(c => c.o.callbackDate && new Date(c.o.callbackDate) < now));
  const today   = sortByDate(all.filter(c => c.o.callbackDate && new Date(c.o.callbackDate).toDateString() === now.toDateString()));
  const future  = sortByDate(all.filter(c => c.o.callbackDate && new Date(c.o.callbackDate) > now));
  const noDate  = all.filter(c => !c.o.callbackDate);

  const cbCard = (c, od=false) => {
    const when = c.o.callbackDate
      ? new Date(c.o.callbackDate).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'}) + (c.o.callbackTime?' at '+c.o.callbackTime:'')
      : 'No date set';
    const note = getNote(c.o,'callback') || getNote(c.o,'call') || '';
    return `
      <div class="cb-card ${od?'overdue':''}" onclick="S.listId='${c.list.id}';nav('calling',{idx:${c.idx}})">
        <div class="flex-b">
          <div class="cb-card-name">${esc(c.o.ownerName)}</div>
          ${od?'<span style="font-size:10px;font-weight:800;color:var(--red);background:var(--red-l);padding:2px 7px;border-radius:20px">OVERDUE</span>':''}
        </div>
        <div class="cb-card-time">📅 ${esc(when)}</div>
        <div class="cb-card-list">${esc(c.list.name)} · ${esc(c.o.mobile)}</div>
        ${note?`<div class="cb-card-note">${esc(note.slice(0,120))}${note.length>120?'…':''}</div>`:''}
      </div>`;
  };

  el.innerHTML = `
    <div class="page-title">Callbacks</div>
    <div class="page-sub">${all.length} scheduled</div>
    ${overdue.length?`<div class="section-label" style="color:var(--red)">Overdue · ${overdue.length}</div>${overdue.map(c=>cbCard(c,true)).join('')}<div class="hr"></div>`:''}
    ${today.length?`<div class="section-label" style="color:var(--p)">Today · ${today.length}</div>${today.map(c=>cbCard(c)).join('')}<div class="hr"></div>`:''}
    ${future.length?`<div class="section-label">Upcoming · ${future.length}</div>${future.map(c=>cbCard(c)).join('')}`:''}
    ${noDate.length?`<div class="hr"></div><div class="section-label">No Date Set · ${noDate.length}</div>${noDate.map(c=>cbCard(c)).join('')}`:''}`;
}

const PROFILE_KEY = 'PROPDIAL_PROFILE';
const TICKETS_KEY = 'PROPDIAL_TICKETS';
const ADMIN_HASH_KEY = 'PROPDIAL_ADMIN_HASH';

function loadProfile() {
  try { return JSON.parse(localStorage.getItem(PROFILE_KEY) || '{}'); } catch { return {}; }
}
function saveProfileData(data) { localStorage.setItem(PROFILE_KEY, JSON.stringify(data)); }

function loadTickets() {
  try { return JSON.parse(localStorage.getItem(TICKETS_KEY) || '[]'); } catch { return []; }
}
function saveTickets(t) { localStorage.setItem(TICKETS_KEY, JSON.stringify(t)); }

// SHA-256 via Web Crypto (async)
async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// Profile photo picker — stores as base64 in localStorage
function pickProfilePhoto() {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'image/*';
  inp.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const p = loadProfile(); p.photo = ev.target.result;
      saveProfileData(p); renderProfile(); toast('Photo updated ✓','ok');
    };
    reader.readAsDataURL(file);
  };
  inp.click();
}

let _profSection = null; // which edit section is open
let _adminUnlocked = false;

function toggleProfSection(s) {
  _profSection = _profSection === s ? null : s;
  renderProfile();
}

function saveProfFields(fields) {
  const p = loadProfile(); Object.assign(p, fields);
  saveProfileData(p); _profSection = null; renderProfile(); toast('Saved ✓','ok');
}

async function changeProfPassword() {
  const p   = loadProfile();
  const cur = document.getElementById('pw-cur')?.value || '';
  const nw  = document.getElementById('pw-new')?.value || '';
  const cn  = document.getElementById('pw-cfm')?.value || '';
  if (p.passwordHash) {
    if (await sha256(cur) !== p.passwordHash) { toast('Current password incorrect','err'); return; }
  }
  if (nw.length < 6) { toast('Minimum 6 characters','err'); return; }
  if (nw !== cn)     { toast('Passwords do not match','err'); return; }
  p.passwordHash = await sha256(nw);
  saveProfileData(p); _profSection = null; renderProfile(); toast('Password updated ✓','ok');
}

async function sendResetRequest() {
  const email = document.getElementById('reset-email')?.value.trim() || '';
  if (!email) { toast('Enter your email address','err'); return; }
  const sub  = encodeURIComponent('[PropDial] Password Reset Request');
  const body = encodeURIComponent(`Password reset requested for account: ${email}\n\nPlease contact this user to reset their PropDial password.`);
  window.location.href = `mailto:support@propdial.app?subject=${sub}&body=${body}`;
  _profSection = null; renderProfile();
  toast('Reset request sent to support','ok');
}

async function submitSupportTicket() {
  const subject = document.getElementById('tkt-subject')?.value.trim() || '';
  const body    = document.getElementById('tkt-body')?.value.trim() || '';
  if (!subject) { toast('Add a subject','err'); return; }
  if (body.length < 10) { toast('Please describe your issue','err'); return; }
  const prof = loadProfile();
  const ticket = {
    id: 'TKT-' + Date.now(),
    subject, body,
    name: prof.name  || 'Unknown User',
    from: prof.email || 'no-email',
    date: new Date().toISOString(),
    status: 'open',
  };
  const tickets = loadTickets(); tickets.unshift(ticket); saveTickets(tickets);
  // Open Mail app with pre-filled support email
  const mailSub  = encodeURIComponent('[PropDial Support] ' + subject);
  const mailBody = encodeURIComponent(
    `Ticket ID: ${ticket.id}\nFrom: ${ticket.name} (${ticket.from})\nDate: ${new Date().toLocaleString()}\n\n${body}`
  );
  window.location.href = `mailto:propdialsupport@gmail.com?subject=${mailSub}&body=${mailBody}`;
  _profSection = null; renderProfile();
  toast('Ticket saved — Mail app opening to send','ok');
}

async function tryAdminLogin() {
  const pw   = document.getElementById('admin-pw-inp')?.value || '';
  if (!pw) { toast('Enter admin password','err'); return; }
  const hash   = await sha256(pw);
  const stored = localStorage.getItem(ADMIN_HASH_KEY);
  // First-time login: default password is  PropDial@Admin2024
  const defaultHash = await sha256('PropDial@Admin2024');
  const match  = stored ? hash === stored : hash === defaultHash;
  if (match) {
    _adminUnlocked = true; _profSection = null;
    renderProfile(); toast('Admin access granted','ok');
  } else {
    toast('Incorrect password','err');
  }
}

  _adminUnlocked = false; renderProfile(); toast('Admin session ended','ok');
}

async function adminChangePassword() {
  const nw = document.getElementById('adm-pw-new')?.value || '';

  if (nw !== cn)     { toast('Passwords do not match','err'); return; }
  localStorage.setItem(ADMIN_HASH_KEY, await sha256(nw));
  _profSection = null; renderProfile(); toast('Admin password updated ✓','ok');

function showListMenu() { showListOptions(S.listId); }

function showListOptions(listId) {
  const list = getList(listId); if (!list) return;
  const s = stats(list);
  openSheet(`
    <div class="sheet-title">${esc(list.name)}</div>
    <div style="font-size:13px;color:var(--g500);margin-bottom:16px">${s.total} owners · ${s.called} called · ${s.connected} connected · ${s.callback} callbacks</div>
    <button class="btn btn-ghost btn-block mb8" onclick="renameList('${listId}')">✏️ Rename List</button>
    <button class="btn btn-ghost btn-block mb8" onclick="duplicateList('${listId}')">⎘ Duplicate (Clean Copy)</button>
    <button class="btn btn-ghost btn-block mb8" onclick="exportList('${listId}')">⬇ Export to Excel (Color Coded)</button>
    <div class="hr"></div>
    <button class="btn btn-danger btn-block" onclick="deleteList('${listId}')">🗑 Delete List</button>`);
}

function renameList(listId) {
  const list = getList(listId); if (!list) return;
  const name = prompt('Rename list:', list.name);
  if (name?.trim()) { list.name = name.trim(); persist(); closeSheet(); toast('List renamed','ok'); renderView(S.view); }
}

function duplicateList(listId) {
  const list = getList(listId); if (!list) return;
  const copy = JSON.parse(JSON.stringify(list));
  copy.id = uid(); copy.name = list.name+' (Copy)';
  copy.uploadDate = Date.now(); copy.lastUsed = null;
  copy.owners = copy.owners.map(o => ({
    ...o, id:uid(), callStatus:null, leadCategory:null,
    note_call:'', note_callback:'', note_selling:'', note_buying:'',
    callbackDate:'', callbackTime:'', attempts:0, retryUsed:false,
    lastCalledAt:null, callConnected:false, doNotCall:false,
    agent:false, finalResult:'', history:[]
  }));
  S.lists.unshift(copy);
  persist(); closeSheet(); toast(`"${copy.name}" created`,'ok'); nav('dashboard');
}

function deleteList(listId) {
  if (!confirm('Delete this list permanently? This cannot be undone.')) return;
  S.lists = S.lists.filter(l => l.id !== listId);
  if (S.listId === listId) S.listId = null;
  persist(); closeSheet(); toast('List deleted','ok'); nav('dashboard');
}

// EXCEL EXPORT — COLOR CODED via ExcelJS
// ExcelJS supports full cell fill colors, unlike SheetJS community.
// ARGB format: FF + hex color (e.g. FFDCFCE7 = green-100 fully opaque)
// ══════════════════════════════════════════════════════════════════
async function exportList(listId) {
  const list = getList(listId); if (!list) return;
  closeSheet();

  // Show loading feedback
  toast('Building export…');

  try {
    const wb = new ExcelJS.Workbook();
    wb.creator   = 'PropDial';
    wb.created   = new Date();
    const ws = wb.addWorksheet('Owners', { views: [{ state: 'frozen', ySplit: 1 }] });

    // ── Column definitions ────────────────────────────────────────
    const EXPORT_COLS = [
      ...COLS,
      'Call Status','Lead Category','Notes (Call)','Notes (Callback)',
      'Notes (Selling)','Notes (Buying)','Callback Date','Callback Time',
      'Attempts','Retry Used','Last Called At',
      'Call Connected','Do Not Call','Agent','Final Result',
    ];

    ws.columns = EXPORT_COLS.map((h,i) => ({
      header:h,
      key:`c${i}`,
      width: [7,13,8,14,13,6,9,11,6,7,12,7].includes(i) ? 18 : h.includes('Notes') ? 32 : 16,
    }));

    // ── Style header row ──────────────────────────────────────────
    const headerRow = ws.getRow(1);
    headerRow.eachCell(cell => {
      cell.fill   = { type:'pattern', pattern:'solid', fgColor:{argb:'FF4C1D95'} };
      cell.font   = { bold:true, color:{argb:'FFFFFFFF'}, size:11 };
      cell.border = { bottom:{ style:'thin', color:{argb:'FF6D28D9'} } };
      cell.alignment = { vertical:'middle', horizontal:'center' };
    });
    headerRow.height = 22;

    // ── Row color map ─────────────────────────────────────────────
    // ARGB: FF = fully opaque
    function getRowArgb(o) {
      if (o.doNotCall)                                                      return 'FFE5E7EB'; // gray-200
      if (o.agent)                                                          return 'FFDBEAFE'; // blue-100
      if (o.leadCategory === 'selling')                                     return 'FFD1FAE5'; // green-100
      if (o.leadCategory === 'buying')                                      return 'FFE0F2FE'; // sky-100
      if (o.leadCategory === 'callback')                                    return 'FFEDE9FE'; // purple-100
      if (o.leadCategory === 'not_interested')                              return 'FFF3F4F6'; // gray-100
      if (o.callStatus === 'connected')                                     return 'FFD1FAE5'; // green-100
      if (['voicemail','no_answer'].includes(o.callStatus))                 return 'FFFEF3C7'; // amber-100
      if (['invalid','switched_off','closed'].includes(o.callStatus))       return 'FFFEE2E2'; // red-100
      return null; // no fill
    }

    // ── Add data rows ─────────────────────────────────────────────
    list.owners.forEach((o, ri) => {
      const allNotes = [
        getNote(o,'call'),getNote(o,'callback'),getNote(o,'selling'),getNote(o,'buying')
      ].filter(Boolean).join(' | ');

      const row = ws.addRow([
        o.date, o.procedureValue, o.area, o.project, o.buildingName,
        o.size, o.unitNumber, o.ownerName, o.mobile, o.country,
        o.callStatus || '',
        o.agent ? 'agent' : o.doNotCall ? 'do_not_call' : (o.leadCategory || ''),
        getNote(o,'call'),
        getNote(o,'callback'),
        getNote(o,'selling'),
        getNote(o,'buying'),
        o.callbackDate || '',
        o.callbackTime || '',
        o.attempts || 0,
        o.retryUsed ? 'Yes' : 'No',
        o.lastCalledAt ? new Date(o.lastCalledAt).toLocaleString('en-GB') : '',
        o.callConnected ? 'Yes' : 'No',
        o.doNotCall ? 'Yes' : 'No',
        o.agent ? 'Yes' : 'No',
        statusLabel(o),
      ]);

      // Apply row fill color
      const argb = getRowArgb(o);
      if (argb) {
        row.eachCell(cell => {
          cell.fill = { type:'pattern', pattern:'solid', fgColor:{argb} };
        });
      }

      // Alternate subtle stripe for uncolored rows
      if (!argb && ri % 2 === 1) {
        row.eachCell(cell => {
          cell.fill = { type:'pattern', pattern:'solid', fgColor:{argb:'FFF9FAFB'} };
        });
      }

      row.alignment = { vertical:'top', wrapText:true };
      row.height = 18;
    });

    // ── Auto-filter on header ─────────────────────────────────────
    ws.autoFilter = { from:'A1', to:{ row:1, column:EXPORT_COLS.length } };

    // ── Generate & download ───────────────────────────────────────
    const buffer = await wb.xlsx.writeBuffer();
    const blob   = new Blob([buffer], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const url    = URL.createObjectURL(blob);
    const a      = document.createElement('a');
    a.href       = url;
    a.download   = list.name.replace(/[^\w\s-]/g,'').trim().replace(/\s+/g,'_') + '_export.xlsx';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast('Color-coded Excel exported ✓','ok');

  } catch(err) {
    console.error(err);
    toast('Export failed — check console','err');
  }
}
